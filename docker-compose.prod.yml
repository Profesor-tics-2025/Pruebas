version: "3.8"
services:
  backend:
    image: ghcr.io/Profesor-tics-2025/video-ai-backend:latest
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/video_ai
      - REDIS_URL=redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  frontend:
    image: ghcr.io/Profesor-tics-2025/video-ai-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_ai
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7

volumes:
  pg_data:
